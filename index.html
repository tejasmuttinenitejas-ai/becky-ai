<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Becky AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#212121;--sidebar:#171717;--hover:#2a2a2a;--input-bg:#2f2f2f;
  --border:rgba(255,255,255,0.08);--accent:#19c37d;--accent-glow:rgba(25,195,125,0.2);
  --text:#ececec;--text2:#8e8ea0;--text3:#4e4e5a;
  --r:10px;--font:'Inter',system-ui,sans-serif;--sw:260px
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}

/* ── AUTH OVERLAY ── */
#auth-overlay{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:999;
}
.auth-box{
  width:360px;padding:40px 36px;background:#1a1a1a;
  border:1px solid var(--border);border-radius:16px;text-align:center;
}
.auth-logo{
  width:52px;height:52px;background:var(--accent);border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;margin:0 auto 20px;box-shadow:0 0 32px var(--accent-glow);
}
.auth-box h2{font-size:22px;font-weight:600;margin-bottom:6px;letter-spacing:-.4px}
.auth-box p{color:var(--text2);font-size:13px;margin-bottom:28px}
.auth-field{
  width:100%;padding:11px 14px;margin-bottom:12px;background:var(--input-bg);
  border:1px solid var(--border);border-radius:var(--r);color:var(--text);
  font-family:var(--font);font-size:14px;outline:none;transition:.2s;
}
.auth-field:focus{border-color:rgba(25,195,125,.4);box-shadow:0 0 0 3px rgba(25,195,125,.08)}
.auth-field::placeholder{color:var(--text3)}
.auth-btn{
  width:100%;padding:11px;border:none;border-radius:var(--r);background:var(--accent);
  color:#000;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:.2s;
}
.auth-btn:hover{background:#15a868;transform:translateY(-1px)}
.auth-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.auth-err{color:#f87171;font-size:12px;margin-top:10px;display:none}
.auth-switch{margin-top:16px;font-size:13px;color:var(--text2)}
.auth-switch a{color:var(--accent);cursor:pointer;text-decoration:none}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;width:100vw;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sw);min-width:var(--sw);background:var(--sidebar);
  display:flex;flex-direction:column;padding:10px 8px;
  border-right:1px solid var(--border);
  transition:transform .25s ease;z-index:50;overflow:hidden;
}
.sidebar.collapsed{transform:translateX(calc(-1 * var(--sw)));position:absolute;height:100%}
.sidebar-top{flex-shrink:0}
.logo{
  display:flex;align-items:center;gap:9px;
  padding:6px 10px 14px;font-size:15px;font-weight:600;letter-spacing:-.3px
}
.logo-icon{
  width:28px;height:28px;background:var(--accent);border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0
}
.new-btn{
  display:flex;align-items:center;gap:7px;width:100%;padding:9px 11px;
  background:transparent;border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-family:var(--font);font-size:13px;font-weight:500;
  cursor:pointer;transition:.2s;margin-bottom:14px;
}
.new-btn:hover{background:var(--hover);border-color:rgba(255,255,255,.13)}
.hist-label{padding:3px 10px 5px;font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--text3)}
#history{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px;min-height:0}
.hist-item{
  padding:8px 11px;font-size:12.5px;color:var(--text2);border-radius:7px;
  cursor:pointer;transition:.2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:7px;
}
.hist-item:hover{background:var(--hover);color:var(--text)}
.hist-item.active{background:var(--hover);color:var(--text)}
.hist-item svg{flex-shrink:0;opacity:.5}
.hist-del{
  margin-left:auto;padding:2px 5px;border:none;background:transparent;
  color:var(--text3);cursor:pointer;border-radius:4px;font-size:11px;opacity:0;transition:.15s
}
.hist-item:hover .hist-del{opacity:1}
.hist-del:hover{background:rgba(239,68,68,.15);color:#f87171}
.sidebar-footer{flex-shrink:0;border-top:1px solid var(--border);padding-top:10px;margin-top:6px}
.user-row{
  display:flex;align-items:center;gap:9px;padding:8px 11px;
  border-radius:var(--r);cursor:pointer;transition:.2s;
}
.user-row:hover{background:var(--hover)}
.avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;
}
.user-meta{flex:1;overflow:hidden}
.user-name{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-sub{font-size:11px;color:var(--text3)}

/* ── SIDEBAR OVERLAY (mobile) ── */
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;
}
.sidebar-overlay.show{display:block}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;gap:10px;padding:10px 18px;
  border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);
}
.icon-btn{
  width:32px;height:32px;border:none;background:transparent;border-radius:7px;
  color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s;flex-shrink:0;
}
.icon-btn:hover{background:var(--hover);color:var(--text)}
.model-pill{
  display:flex;align-items:center;gap:6px;padding:5px 10px;
  border:none;background:transparent;border-radius:var(--r);
  color:var(--text);font-family:var(--font);font-size:13.5px;font-weight:600;
  cursor:default;
}
.badge{
  font-size:9px;font-weight:700;padding:2px 5px;border-radius:20px;
  background:rgba(25,195,125,.15);color:var(--accent);letter-spacing:.3px
}
.hdr-right{margin-left:auto;display:flex;gap:6px}
.hdr-btn{
  padding:6px 12px;border-radius:var(--r);border:1px solid var(--border);
  background:transparent;color:var(--text2);font-family:var(--font);
  font-size:12px;font-weight:500;cursor:pointer;transition:.2s;
}
.hdr-btn:hover{background:var(--hover);color:var(--text);border-color:rgba(255,255,255,.13)}
.hdr-btn.red:hover{background:rgba(239,68,68,.12);color:#f87171;border-color:rgba(239,68,68,.2)}

/* ── MESSAGES ── */
#messages{flex:1;overflow-y:auto;padding:28px 0;scroll-behavior:smooth}

/* Welcome */
.welcome{max-width:620px;margin:50px auto 0;padding:0 24px;text-align:center;animation:up .35s ease}
.wlc-icon{
  width:54px;height:54px;background:var(--accent);border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  margin:0 auto 20px;box-shadow:0 0 40px var(--accent-glow);
}
.welcome h1{font-size:26px;font-weight:600;letter-spacing:-.5px;margin-bottom:8px}
.welcome p{color:var(--text2);font-size:14px;line-height:1.6;margin-bottom:28px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;text-align:left}
.card{
  padding:13px 15px;background:var(--input-bg);border:1px solid var(--border);
  border-radius:12px;cursor:pointer;transition:.2s;
}
.card:hover{background:var(--hover);border-color:rgba(255,255,255,.13);transform:translateY(-1px)}
.card-icon{font-size:17px;margin-bottom:5px}
.card-title{font-size:12.5px;font-weight:500;margin-bottom:2px}
.card-sub{font-size:11.5px;color:var(--text3)}

/* Rows */
.row{max-width:680px;margin:0 auto;padding:5px 22px;animation:up .22s ease}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.row.user{display:flex;justify-content:flex-end}
.row.ai{display:flex;align-items:flex-start;gap:11px}
.ai-av{
  width:30px;height:30px;background:var(--accent);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;margin-top:2px;
}
.bubble{font-size:14px;line-height:1.72;border-radius:13px}
.bubble.user{
  max-width:78%;padding:11px 15px;
  background:var(--input-bg);border:1px solid var(--border);
  border-bottom-right-radius:3px;
}
.bubble.ai{background:transparent;flex:1;max-width:100%;padding:3px 0}
.bubble.ai p{margin-bottom:10px}.bubble.ai p:last-child{margin-bottom:0}
.bubble.ai code{background:rgba(255,255,255,.07);padding:2px 5px;border-radius:4px;font-size:13px}
.bubble.ai pre{background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:13px 15px;overflow-x:auto;margin:10px 0}
.bubble.ai pre code{background:none;padding:0}
.bubble.ai ul,.bubble.ai ol{padding-left:20px;margin-bottom:10px}
.bubble.ai li{margin-bottom:3px}
.bubble.ai h1,.bubble.ai h2,.bubble.ai h3{margin:12px 0 5px;font-weight:600}
.bubble.ai strong{color:#fff}
.bubble.ai blockquote{border-left:3px solid var(--accent);padding-left:11px;color:var(--text2);margin:7px 0}
.bubble.ai table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.bubble.ai th,.bubble.ai td{padding:8px 12px;border:1px solid var(--border);text-align:left}
.bubble.ai th{background:var(--input-bg);font-weight:600}
.msg-actions{display:flex;gap:3px;margin-top:5px;opacity:0;transition:.2s}
.row.ai:hover .msg-actions{opacity:1}
.act-btn{
  width:26px;height:26px;border:none;background:transparent;
  border-radius:5px;color:var(--text3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:12px;transition:.2s;
}
.act-btn:hover{background:var(--hover);color:var(--text2)}

/* Typing */
.typing{display:inline-flex;gap:4px;align-items:center;padding:5px 0}
.typing span{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ── INPUT ── */
.input-area{padding:14px 22px 18px;flex-shrink:0;background:var(--bg)}
.input-wrap{
  max-width:680px;margin:0 auto;background:var(--input-bg);
  border:1px solid var(--border);border-radius:14px;
  display:flex;align-items:flex-end;gap:6px;padding:9px 10px 9px 15px;transition:.2s;
}
.input-wrap:focus-within{border-color:rgba(25,195,125,.4);box-shadow:0 0 0 3px rgba(25,195,125,.07)}
#input{
  flex:1;background:transparent;border:none;outline:none;resize:none;
  color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;
  max-height:180px;overflow-y:auto;padding:2px 0;
}
#input::placeholder{color:var(--text3)}
.input-foot{
  text-align:center;padding-top:7px;font-size:11px;color:var(--text3);
  max-width:680px;margin:0 auto;
}
.send-btn{
  width:32px;height:32px;border:none;border-radius:8px;background:var(--accent);
  color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s;flex-shrink:0;
}
.send-btn:hover{background:#15a86a;transform:scale(1.05)}
.send-btn:disabled{background:var(--hover);color:var(--text3);cursor:not-allowed;transform:none}

/* ── STATUS TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1a1a1a;border:1px solid var(--border);border-radius:10px;
  padding:10px 18px;font-size:13px;color:var(--text2);
  transition:.3s;z-index:999;pointer-events:none;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.err{color:#f87171;border-color:rgba(239,68,68,.2)}
#toast.ok{color:var(--accent)}

/* ── CODE PANELS (GPT-style) ── */
.code-panel{
  background:#161b22;border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;margin:12px 0;overflow:hidden;
}
.code-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:#1f2428;
  border-bottom:1px solid rgba(255,255,255,0.07);
}
.code-lang{
  font-size:12px;font-weight:500;color:#8b949e;
  font-family:'Inter',system-ui,sans-serif;text-transform:lowercase;
}
.code-copy-btn{
  display:flex;align-items:center;gap:5px;
  background:transparent;border:none;cursor:pointer;
  font-size:12px;font-family:'Inter',system-ui,sans-serif;
  color:#8b949e;padding:3px 7px;border-radius:5px;transition:.2s;
}
.code-copy-btn:hover{background:rgba(255,255,255,.06);color:#c9d1d9}
.code-panel pre{
  margin:0;padding:14px 16px;overflow-x:auto;
  background:transparent;border:none;border-radius:0;
}
.code-panel pre code{
  background:none;padding:0;font-size:13px;
  font-family:'Fira Code','Cascadia Code','Consolas',monospace;
  line-height:1.6;color:#e6edf3;
}

@media(max-width:700px){
  .sidebar{position:absolute;height:100%;transform:translateX(calc(-1 * var(--sw)))}
  .sidebar.open{transform:translateX(0)}
  .cards{grid-template-columns:1fr}
  .bubble.user{max-width:90%}
  .hdr-btn.desktop-only{display:none}
  .auth-box{width:calc(100vw - 40px);padding:32px 24px}
  .row{padding:5px 14px}
  .input-area{padding:10px 14px 16px}
  .welcome{padding:0 16px;margin-top:30px}
  .welcome h1{font-size:22px}
}
</style>
</head>
<body>

<!-- ── AUTH OVERLAY ── -->
<div id="auth-overlay">
  <div class="auth-box">
    <div class="auth-logo">✦</div>
    <h2 id="auth-title">Welcome back</h2>
    <p id="auth-sub">Sign in to continue to Becky AI</p>
    <input class="auth-field" id="auth-user" type="text" placeholder="Username" autocomplete="username">
    <input class="auth-field" id="auth-pass" type="password" placeholder="Password" autocomplete="current-password">
    <div id="auth-name-wrap" style="display:none">
      <input class="auth-field" id="auth-name" type="text" placeholder="Display name (optional)">
    </div>
    <button class="auth-btn" id="auth-submit">Sign In</button>
    <div class="auth-err" id="auth-err"></div>
    <div class="auth-switch">
      <span id="auth-switch-text">Don't have an account?</span>
      <a id="auth-toggle"> Sign up</a>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div class="app" id="app" style="display:none">

  <!-- Sidebar overlay (mobile tap-to-close) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-icon">✦</div>
        Becky AI
      </div>
      <button class="new-btn" id="new-btn-sidebar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New chat
      </button>
      <div class="hist-label">Recent</div>
    </div>
    <div id="history"></div>
    <div class="sidebar-footer">
      <div class="user-row" id="logout-row">
        <div class="avatar" id="user-avatar">U</div>
        <div class="user-meta">
          <div class="user-name" id="user-display">User</div>
          <div class="user-sub">Click to logout</div>
        </div>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text3);flex-shrink:0">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="header">
      <button class="icon-btn" id="toggle-sidebar-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="model-pill">
        Becky AI <span class="badge" id="model-badge">LOCAL</span>
      </div>
      <div class="hdr-right">
        <button class="hdr-btn desktop-only" id="new-btn-header">+ New chat</button>
        <button class="hdr-btn red desktop-only" id="logout-btn-header">Logout</button>
      </div>
    </div>

    <div id="messages"></div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="Message Becky AI…"></textarea>
        <button class="send-btn" id="send-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-foot">Becky AI runs locally via Ollama — your data stays on your machine.</div>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
